<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CC Start</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div class="container">
      <h1 class="title">CC Start</h1>

      <!-- 工作目录 -->
      <div class="section">
        <div class="section-label">工作目录</div>
        <div class="dir-row">
          <input type="text" id="work-dir" placeholder="选择或输入工作目录" />
          <button type="button" id="browse-btn">浏览</button>
        </div>
        <div class="error-msg" id="dir-error"></div>
      </div>

      <!-- 启动模式 -->
      <div class="section">
        <div class="section-label">启动模式</div>
        <div class="radio-group">
          <label class="radio-item">
            <input type="radio" name="mode" value="normal" checked />
            <span>普通启动</span>
          </label>
          <label class="radio-item">
            <input type="radio" name="mode" value="skip-permissions" />
            <span>跳过权限确认</span>
          </label>
        </div>
      </div>

      <!-- 选择模型 -->
      <div class="section">
        <div class="section-label">选择模型</div>
        <div class="error-msg" id="model-error"></div>
        <div class="model-grid" id="model-grid">
          <!-- 模型卡片由 JS 动态生成 -->
        </div>
      </div>

      <!-- 启动按钮 -->
      <button type="button" id="launch-btn">启动</button>

      <!-- 次级按钮 -->
      <div class="secondary-btns">
        <button type="button" class="btn-secondary disabled" id="config-btn" disabled title="即将推出">配置管理</button>
        <button type="button" class="btn-secondary disabled" id="add-btn" disabled title="即将推出">添加模型</button>
      </div>

      <!-- Toast -->
      <div class="toast" id="toast"></div>
    </div>
  </body>
</html>
