<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CC Start</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div class="container">
      <!-- 顶部标题栏 -->
      <div class="header">
        <div class="header-left">
          <h1 class="title">CC Start</h1>
          <input type="text" id="search-box" placeholder="搜索配置..." />
        </div>
        <div class="header-right">
          <button type="button" class="btn-primary" id="add-config-btn">
            <span class="btn-icon">+</span> 新增配置
          </button>
        </div>
      </div>

      <!-- 配置列表容器 -->
      <div class="config-list" id="config-list">
        <!-- 配置行由 JS 动态生成 -->
      </div>

      <!-- 空状态 -->
      <div class="empty-state" id="empty-state" style="display: none;">
        <p>暂无配置</p>
        <p class="empty-hint">点击"新增配置"添加第一个模型</p>
      </div>

      <!-- Toast -->
      <div class="toast" id="toast"></div>
    </div>

    <!-- 详情页（隐藏，切换视图显示） -->
    <div class="detail-page" id="detail-page" style="display: none;">
      <div class="detail-header">
        <button type="button" class="btn-back" id="back-btn">&lt; 返回</button>
        <h2 class="detail-title">编辑配置</h2>
      </div>
      <div class="detail-form" id="detail-form">
        <!-- 详情页表单内容 -->
      </div>
    </div>
  </body>
</html>
